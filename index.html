<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan UPT SDN 200 Gresik</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-800">
    
    <header class="text-center mb-8">
        <img src="NAMA_FILE_LOGO_ANDA_DI_SINI.webp" alt="Logo Sekolah" class="w-32 md:w-40 h-auto mx-auto mb-6 object-contain drop-shadow-md fallback-logo">
        <h1 class="heading-font text-3xl md:text-4xl font-bold mb-2">UPT SDN 200 Gresik</h1>
        <p class="text-md md:text-lg text-slate-600">Pengumuman Kelulusan Angkatan 2025/2026</p>
    </header>

    <div id="login-section" class="bg-white p-8 rounded-2xl shadow-lg border border-slate-100 max-w-sm w-full flex flex-col items-center">
        <h2 class="text-xl font-bold mb-4">Cek Kelulusan</h2>
        <p class="text-sm text-center text-slate-500 mb-6">Masukkan NISN Anda untuk membuka hasil pengumuman kelulusan.</p>
        
        <input type="text" id="nisn-input" placeholder="Masukkan NISN..." class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-green-500 mb-4 text-center text-lg font-medium tracking-widest">
        
        <button id="btn-login" onclick="cekKelulusan()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors shadow-md disabled:bg-slate-400">
            Sedang Memuat Data...
        </button>
        
        <p id="error-msg" class="text-red-500 text-sm mt-4 hidden text-center font-medium">NISN tidak ditemukan. Cek kembali.</p>
    </div>

    <main id="scratch-section" class="flex-col items-center hidden w-full">
        <div class="scratch-card-wrapper">
            <div class="result-layer shadow-lg border border-orange-200">
                <h2 id="status-lulus" class="heading-font text-4xl font-bold text-center text-white drop-shadow-md mt-2">LULUS!</h2>
                <p id="nama-siswa-lulus" class="mt-2 text-lg font-medium text-white text-center px-4 leading-tight"></p>
                
                <a id="btn-download" href="#" target="_blank" class="mt-5 px-6 py-2 bg-white text-orange-600 font-bold rounded-full shadow-md hover:bg-orange-50 transition-colors hidden cursor-pointer z-50">
                    📥 Download SKL
                </a>
            </div>
            
            <canvas id="scratch-canvas" width="320" height="220"></canvas>
        </div>
        <p class="instruction mt-8 text-sm font-bold text-slate-500 uppercase tracking-widest">✨ Gosok Area Kartu Di Atas ✨</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
